---

###########
# Configs #
###########

- name: Configs
  tags: [configs]
  hosts: debian
  vars:
    tests_dir: /molecule/apt/configs
  tasks:
    - name: Clean tests dir
      ansible.builtin.file:  # noqa: risky-file-permissions
        path: "{{ tests_dir }}/{{ item.0 }}"
        state: "{{ item.1 }}"
      loop: "{{ ['default', 'defaults', 'exclusive'] | product(['absent', 'directory']) }}"
    - name: Touch existing files
      ansible.builtin.file:  # noqa: risky-file-permissions
        path: "{{ tests_dir }}/{{ item }}"
        state: touch
      loop: [
        default/state_absent_existing, default/state_ignore_existing,
        exclusive/existing, exclusive/existing_present, exclusive/existing_ignore,
      ]
    - block:  # noqa: name[missing]
        - name: Role - Default
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: configs
          vars:
            manala_apt_configs_exclusive: false
            manala_apt_configs_dir: "{{ tests_dir }}/default"
            manala_apt_configs_defaults: {}
            manala_apt_configs:
              # Content
              - file: content
                config: |
                  Content
              # Template
              - file: template
                template: fixtures/template.j2
              - template: fixtures/template_file.j2
              # Flatten
              -
                - file: flatten
              # State
              - file: state_present_implicit
              - file: state_present
                state: present
              - file: state_absent
                state: absent
              - file: state_absent_existing
                state: absent
              - file: state_ignore
                state: ignore
              - file: state_ignore_existing
                state: ignore
        - name: Role - Defaults
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: configs
          vars:
            manala_apt_configs_exclusive: false
            manala_apt_configs_dir: "{{ tests_dir }}/defaults"
            manala_apt_configs_defaults:
              template: fixtures/template.j2
            manala_apt_configs:
              - file: template
              - template: fixtures/template_file.j2
              - file: template_overwrite
                template: fixtures/template_file.j2
        - name: Role - Exclusive
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: configs
          vars:
            manala_apt_configs_exclusive: true
            manala_apt_configs_dir: "{{ tests_dir }}/exclusive"
            manala_apt_configs_defaults: {}
            manala_apt_configs:
              - file: existing_present
              - file: existing_ignore
                state: ignore
              - file: ignore
                state: ignore
      always:
        - name: Goss
          ansible.builtin.command:
            cmd: goss --gossfile - validate
            stdin: "{{ lookup('ansible.builtin.template', 'goss/configs.yaml.j2') }}"
          changed_when: false

################
# Sources List #
################

- name: Sources List
  tags: [sources_list]
  hosts: debian
  vars:
    tests_dir: /molecule/apt/sources_list
  tasks:
    - name: Clean tests dir
      ansible.builtin.file:  # noqa: risky-file-permissions
        path: "{{ tests_dir }}"
        state: "{{ item }}"
      loop: [absent, directory]
    - block:  # noqa: name[missing]
        - name: Role - Content
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: sources_list
          vars:
            manala_apt_sources_list_file: "{{ tests_dir }}/content"
            manala_apt_sources_list_template: ~
            manala_apt_sources_list: |
              Content
        - name: Role - Template
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: sources_list
          vars:
            manala_apt_sources_list_file: "{{ tests_dir }}/template"
            manala_apt_sources_list_template: fixtures/template.j2
            manala_apt_sources_list: ~
      always:
        - name: Goss
          ansible.builtin.command:
            cmd: goss --gossfile - validate
            stdin: "{{ lookup('ansible.builtin.template', 'goss/sources_list.yaml.j2') }}"
          changed_when: false

###############
# Preferences #
###############

- name: Preferences
  tags: [preferences]
  hosts: debian
  vars:
    tests_dir: /molecule/apt/preferences
  tasks:
    - name: Clean tests dir
      ansible.builtin.file:  # noqa: risky-file-permissions
        path: "{{ tests_dir }}/{{ item.0 }}"
        state: "{{ item.1 }}"
      loop: "{{ ['default', 'defaults', 'exclusive'] | product(['absent', 'directory']) }}"
    - name: Touch existing files
      ansible.builtin.file:  # noqa: risky-file-permissions
        path: "{{ tests_dir }}/{{ item }}"
        state: touch
      loop: [
        default/state_absent_existing, default/state_ignore_existing,
        exclusive/existing, exclusive/existing_present, exclusive/existing_ignore,
      ]
    - block:  # noqa: name[missing]
        - name: Role - Default
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: preferences
          vars:
            manala_apt_preferences_exclusive: false
            manala_apt_preferences_dir: "{{ tests_dir }}/default"
            manala_apt_preferences_defaults: {}
            manala_apt_preferences:
              # Short syntax
              - git@backports
              - libssl1.0.0@backports
              - php@sury_php:300
              - sury_php:100
              - sury_php:200
              # Pattern syntax
              - preference: ansible@ansible
              - preference: ansible@ansible
                file: ansible_foo
              - preference: ansible@ansible
                file: ansible_bar
                package: foo bar*
              - preference: ansible@ansible
                file: ansible_baz
                pin: baz
              - preference: ansible@ansible
                file: ansible_qux
                priority: 1234
              # Verbose syntax
              - package: foo
                pin: foo
                priority: 100
                file: foo_foo
              # Template
              - file: template
                template: fixtures/template.j2
              # Flatten
              -
                - package: foo
                  pin: foo
                  priority: 100
                  file: flatten
              # State
              - package: foo
                pin: foo
                priority: 100
                file: state_present_implicit
              - package: foo
                pin: foo
                priority: 100
                file: state_present
                state: present
              - package: foo
                pin: foo
                priority: 100
                file: state_absent
                state: absent
              - package: foo
                pin: foo
                priority: 100
                file: state_absent_existing
                state: absent
              - package: foo
                pin: foo
                priority: 100
                file: state_ignore
                state: ignore
              - package: foo
                pin: foo
                priority: 100
                file: state_ignore_existing
                state: ignore
        - name: Role - Defaults
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: preferences
          vars:
            manala_apt_preferences_exclusive: false
            manala_apt_preferences_dir: "{{ tests_dir }}/defaults"
            manala_apt_preferences_defaults:
              template: fixtures/template.j2
            manala_apt_preferences:
              - file: template
              - file: template_overwrite
                template: fixtures/template_file.j2
        - name: Role - Exclusive
          ansible.builtin.import_role:
            name: manala.roles.apt
            tasks_from: preferences
          vars:
            manala_apt_preferences_exclusive: true
            manala_apt_preferences_dir: "{{ tests_dir }}/exclusive"
            manala_apt_preferences_defaults: {}
            manala_apt_preferences:
              - package: bar
                pin: bar
                priority: 100
                file: existing_present
              - file: existing_ignore
                state: ignore
              - file: ignore
                state: ignore
      always:
        - name: Goss
          ansible.builtin.command:
            cmd: goss --gossfile - validate
            stdin: "{{ lookup('ansible.builtin.template', 'goss/preferences.yaml.j2') }}"
          changed_when: false

